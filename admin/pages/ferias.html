<div class="card" style="height: 100%; display: flex; flex-direction: column;">
    
    <div class="toolbar" style="align-items: flex-start; gap: 10px;">
        <div class="filter-container" id="container-filtros-ferias" style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px; align-items: flex-end;">
            <button class="btn-new-user" onclick="abrirModalFerias()">
                <i class="fas fa-umbrella-beach"></i> Solicitar Férias
            </button>
            <button class="btn-add-filter" onclick="adicionarFiltroFerias()">
                <i class="fas fa-plus"></i> Adicionar Filtro
            </button>
        </div>
    </div>

    <div class="stats-bar" style="padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;">
        <div id="lbl-contagem-ferias" style="color: #333; font-weight: 700;">Carregando...</div>
        
        <div id="lbl-filtros-ativos-ferias" style="color: #003399; font-weight: 500; text-align: right;">
            <i class="fas fa-filter"></i> Mostrando todos
        </div>
    </div>

    <div class="table-wrapper" style="flex: 1; overflow: auto;">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Colaborador</th>
                    <th>Início</th>
                    <th>Dias</th>
                    <th>Fim (Previsto)</th>
                    <th>Unidade</th>
                    <th>Status</th>
                    <th style="width: 140px; text-align: right; padding-right: 20px;">Ações</th>
                </tr>
            </thead>
            <tbody id="tbody-ferias">
                <tr><td colspan="7" class="text-center p-3">Carregando dados... <i class="fas fa-spinner fa-spin"></i></td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modal-ferias">
    <div class="modal-box" style="width: 700px;">
        <div class="modal-header" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size: 1.2rem; font-weight: bold; color: #333;">
                <i class="fas fa-umbrella-beach" style="color: var(--cor-primaria); margin-right: 10px;"></i>
                <span id="titulo-modal-ferias">Solicitar Férias</span>
            </div>
            <button onclick="fecharModalFerias()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color: #666;">&times;</button>
        </div>
        
        <form id="form-ferias" onsubmit="return false;">
            <input type="hidden" id="ferias-id">
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Colaborador</label>
                <select id="ferias-colaborador" class="form-control" required style="width: 100%; height: 38px;" onchange="verificarConflitoFeriasVisual()">
                    <option value="">Carregando...</option>
                </select>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Data Início</label>
                    <input type="date" class="form-control" id="ferias-inicio" required style="width: 100%; height: 38px;" onchange="verificarConflitoFeriasVisual()">
                </div>
                <div class="form-group" style="width: 100px;">
                    <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Qtd. Dias</label>
                    <input type="number" class="form-control" id="ferias-dias" value="30" min="5" max="45" required style="width: 100%; height: 38px;" onchange="verificarConflitoFeriasVisual()">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Fim Previsto</label>
                    <input type="text" class="form-control" id="ferias-fim" disabled style="background-color: #e9ecef; width: 100%; height: 38px;">
                </div>
            </div>

            <div id="alert-conflito-simples" style="display:none; margin-bottom: 15px; padding: 12px; background-color: #fff3cd; border-left: 4px solid #ffc107; border-radius: 4px; color: #856404; font-size: 0.9rem;">
                <i class="fas fa-exclamation-triangle"></i> <span id="msg-conflito-simples"></span>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-size: 0.85rem; font-weight: bold; color: #555;">Observação</label>
                <textarea class="form-control" id="ferias-obs" rows="2" style="width: 100%; border: 1px solid #ced4da; border-radius: 4px; padding: 8px;"></textarea>
            </div>

            <div id="area-analise-gestor" style="display:none; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
                </div>

            <div class="modal-footer" id="modal-footer-ferias" style="padding-top: 15px; display: flex; justify-content: flex-end; gap: 10px;">
                </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="modal-confirmacao-decisao" style="z-index: 9999;">
    <div class="modal-box" style="width: 400px; text-align: center; padding: 25px;">
        <div style="font-size: 3rem; margin-bottom: 15px;" id="icone-decisao">
            </div>
        
        <h3 style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333;" id="titulo-decisao">
            Confirmar Ação
        </h3>
        
        <p style="font-size: 0.95rem; color: #666; margin-bottom: 25px;" id="msg-decisao">
            Tem certeza que deseja prosseguir?
        </p>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="fecharModalDecisao()" class="btn-cancel" style="background:#f0f0f0; color:#333; border:1px solid #ccc; padding: 8px 20px; border-radius:4px; font-weight:500;">
                Cancelar
            </button>
            <button id="btn-confirmar-decisao" style="color:white; border:none; padding: 8px 20px; border-radius:4px; font-weight:bold; cursor:pointer;">
                Confirmar
            </button>
        </div>
    </div>
</div>
