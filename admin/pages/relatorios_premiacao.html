<div class="card" style="height: 100%; display: flex; flex-direction: column;">
    <div class="toolbar" style="flex-direction: column; align-items: flex-start; gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; flex-shrink: 0;">
        
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <span style="font-weight: 700; color: #003399; font-size: 1.1rem;">
                <i class="fas fa-filter" style="margin-right: 8px;"></i> Parâmetros de Premiação
            </span>
            <button class="btn-add-filter" onclick="adicionarFiltroRelatorioPremiacao()" style="display: flex; align-items: center; gap: 8px; color: #003399; font-weight: 600; border: none; background: none; cursor: pointer;">
                <i class="fas fa-plus-circle"></i> ADICIONAR FILTRO
            </button>
        </div>

        <div class="filter-container" id="container-filtros-rel-premiacao" style="width: 100%; display: flex; flex-direction: column; gap: 8px;">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 20px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <label class="switch">
                    <input type="checkbox" id="rel-prem-detalhado">
                    <span class="slider"></span>
                </label>
                <span style="font-size: 14px; font-weight: 600; color: #444;">
                    Relatório Detalhado <span style="font-weight: normal; color: #888; font-size: 0.8rem;">(Exibir critérios no relatório)</span>
                </span>
            </div>
            
            <button class="btn-primary" id="btn-gerar-rel-premiacao"
                    style="width: 240px; height: 48px; background-color: #003399; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); text-transform: uppercase;">
                <i class="fas fa-file-alt"></i> GERAR RELATÓRIO
            </button>
        </div>
    </div>

    <div id="empty-state-premiacao" style="flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #bbb; background: #fff; border-radius: 0 0 8px 8px;">
        <i class="fas fa-trophy" style="font-size: 5rem; margin-bottom: 20px; opacity: 0.3;"></i>
        <h4 style="margin-bottom: 10px; color: #999;">Aguardando Parâmetros</h4>
        <p style="font-size: 0.9rem;">Defina a competência ou motorista para gerar o documento.</p>
    </div>
</div>

<div class="modal-overlay" id="modal-preview-rel-premiacao" style="z-index: 5000;">
    <div class="modal-box" style="width: 98%; max-width: 1400px; height: 95vh; display: flex; flex-direction: column; padding: 0; border-radius: 8px; overflow: hidden; background: white;">
        <div class="modal-header" style="background: #003399; color: white; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; flex-shrink: 0;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-file-pdf"></i>
                <span style="font-weight: bold; font-size: 1.1rem;">Visualização da Apuração</span>
            </div>
            <button onclick="document.getElementById('modal-preview-rel-premiacao').classList.remove('active')" style="background:none; border:none; color:white; font-size: 1.8rem; cursor:pointer;">&times;</button>
        </div>
        <iframe id="iframe-pdf-premiacao" src="" style="width: 100%; flex: 1; border: none;"></iframe>
    </div>
</div>

<div class="modal-overlay" id="modal-selecao-formato-prem" style="z-index: 5000;">
    <div class="modal-box" style="width: 400px; text-align: center; padding: 30px;">
        <h3 style="color: #003399; margin-bottom: 10px;">Exportar Relatório</h3>
        <p style="color: #666; margin-bottom: 25px;">Escolha o formato do arquivo:</p>
        
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="btn-primary" onclick="window.iniciarExportacaoPremiacao('pdf')" style="background-color: #dc3545; min-width: 120px;">
                <i class="fas fa-file-pdf"></i> PDF
            </button>
            <button class="btn-primary" onclick="window.iniciarExportacaoPremiacao('excel')" style="background-color: #198754; min-width: 120px;">
                <i class="fas fa-file-excel"></i> Excel
            </button>
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn-cancel" onclick="document.getElementById('modal-selecao-formato-prem').classList.remove('active')">Cancelar</button>
        </div>
    </div>
</div>
