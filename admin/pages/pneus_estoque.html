<style>
    /* Componentes e Ícones */
    .btn-action-sm { background: none; border: none; padding: 4px 6px; cursor: pointer; font-size: 1rem; transition: transform 0.2s; }
    .btn-action-sm:hover { transform: scale(1.15); }
    .icon-view { color: var(--cor-primaria); }
    .icon-edit { color: #6c757d; }
    .icon-hist { color: #20c997; } 
    .icon-del { color: #dc3545; } 

    .badge-status-pneu { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; color: white; display: inline-block; text-align: center; min-width: 90px; }
    .status-novo { background: #007bff; }
    .status-uso { background: #28a745; }
    .status-recapagem { background: #fd7e14; }
    .status-estoque-recap { background: #17a2b8; }
    .status-descartado { background: #dc3545; }

    .info-sulco { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #333; }
</style>

<div class="card" style="height: 100%; display: flex; flex-direction: column; padding: 20px;">
    
    <div id="content-pneus-estoque" style="flex: 1; display: flex; flex-direction: column;">
        <div class="toolbar" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 10px;">
            <div id="container-filtros-pneus" style="flex: 1; display: flex; flex-direction: column; gap: 8px;"></div>
            <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end; min-width: 150px;">
                <button class="btn-primary" onclick="window.abrirModalPneu()">
                    <i class="fas fa-plus-circle icon-left"></i> Novo Pneu
                </button>
                <button class="btn-add-filter" onclick="window.adicionarFiltroPneus()" style="background: transparent; border: none; color: var(--cor-primaria); padding: 5px 0; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                    <i class="fas fa-plus"></i> Adicionar Filtro
                </button>
            </div>
        </div>

        <div style="background: #f8f9fa; padding: 8px 12px; border: 1px solid #e9ecef; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #666; margin-bottom: 10px;">
            <span id="lbl-contagem-pneus">Aguardando dados...</span>
            <span id="lbl-filtros-ativos-pneus" style="font-style: italic; font-size: 0.8rem;"></span>
        </div>

        <div style="flex: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; position: relative;">
            <table class="table table-hover">
                <thead style="position: sticky; top: 0; background: #fff; z-index: 1;">
                    <tr>
                        <th style="width: 120px;">Nº Fogo</th>
                        <th>Marca / Modelo</th>
                        <th>Tipo</th>
                        <th>Medida</th>
                        <th>Unidade</th>
                        <th>Status Atual</th>
                        <th>Localização / Aplicação</th>
                        <th style="width: 150px; text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tbody-pneus"></tbody>
            </table>
            <div id="loading-pneus" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 10;">
                <div style="text-align: center; color: var(--cor-primaria);"><i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-pneu" style="z-index: 1000;">
    <div class="modal-box" style="width: 800px; max-width: 95%;">
        <div class="modal-header">
            <span id="titulo-modal-pneu" style="font-size: 1.1rem; font-weight: bold; color: var(--cor-primaria);">Novo Pneu</span>
            </div>
        
        <form id="form-pneu" onsubmit="window.salvarPneu(event)">
            <input type="hidden" id="pneu-id">
            <div class="modal-body" style="padding: 20px;">
                
                <div style="display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group">
                        <label class="lbl-form">Nº de Fogo (ID) *</label>
                        <input type="text" id="pneu-fogo" class="form-control" required placeholder="Ex: PN-0012">
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">Unidade *</label>
                        <select id="pneu-unidade" class="form-control" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">DOT (Semana/Ano) *</label>
                        <input type="text" id="pneu-dot" class="form-control" required placeholder="Ex: 3524">
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">Medida *</label>
                        <input type="text" id="pneu-medida" class="form-control" required placeholder="Ex: 295/80 R22.5">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group">
                        <label class="lbl-form">Marca *</label>
                        <input type="text" id="pneu-marca" class="form-control" required placeholder="Ex: Michelin">
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">Modelo (Banda) *</label>
                        <input type="text" id="pneu-modelo" class="form-control" required placeholder="Ex: X Multi Z">
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">Tipo *</label>
                        <select id="pneu-tipo" class="form-control" required>
                            <option value="Liso (Direcional)">Liso (Direcional)</option>
                            <option value="Misto">Misto</option>
                            <option value="Borrachudo (Tração)">Borrachudo (Tração)</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group">
                        <label class="lbl-form">Sulco Original (mm) *</label>
                        <input type="number" id="pneu-sulco-orig" class="form-control" required step="0.1" min="1" placeholder="Ex: 16.5">
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">Custo Aquisição (R$)</label>
                        <input type="text" id="pneu-valor" class="form-control" placeholder="0,00" onkeyup="window.formatarMoedaGenerica(this)">
                    </div>
                    <div class="form-group">
                        <label class="lbl-form">Fornecedor / NF</label>
                        <input type="text" id="pneu-nota" class="form-control" placeholder="Nota Fiscal ou Loja">
                    </div>
                </div>

                <div class="form-group">
                    <label class="lbl-form">Observações</label>
                    <textarea id="pneu-obs" class="form-control" rows="3" placeholder="Informações adicionais da compra..."></textarea>
                </div>

            </div>
            <div class="modal-footer" style="padding: 15px 20px; background: #f8f9fa; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn-cancel" onclick="window.fecharModalPneu()">Cancelar</button>
                <button type="submit" class="btn-primary" id="btn-salvar-pneu">Salvar Pneu</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="modal-confirmar-exclusao-pneu" style="z-index: 12000;">
    <div class="modal-box" style="width: 420px; border-top: 5px solid #dc3545; border-radius: 12px;">
        <input type="hidden" id="excluir-pneu-id">
        <div class="modal-header" style="padding: 20px; text-align: center; display: block;">
            <div style="background: #fff5f5; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <i class="fas fa-trash-alt" style="color: #dc3545; font-size: 1.8rem;"></i>
            </div>
            <span style="font-weight: 800; font-size: 1.3rem; color: #333; display: block;">Confirmar Exclusão?</span>
            <span id="lbl-excluir-pneu-fogo" style="display:block; margin-top: 5px; color: #666; font-size: 0.9rem;"></span>
        </div>
        <div class="modal-footer" style="padding: 15px 25px; display: flex; gap: 10px; background: #f8f9fa; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;">
            <button type="button" class="btn-cancel" style="flex: 1;" onclick="document.getElementById('modal-confirmar-exclusao-pneu').classList.remove('active')">Cancelar</button>
            <button type="button" class="btn-primary" style="flex: 1; background: #dc3545; border: none;" onclick="window.executarExclusaoDefinitivaPneu()">Sim, Excluir</button>
        </div>
    </div>
</div>
